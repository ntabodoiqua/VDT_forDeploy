server:
  port: 8080
  servlet:
    context-path: /lms

spring:
  # Ba khối datasource, jpa, và servlet bây giờ đã được căn lề thẳng hàng.
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
    
  servlet:
    multipart:
      max-file-size: 250MB
      max-request-size: 250MB

jwt:
  signerKey: "${JWT_SIGNER_KEY:U+NXeAi5ytRMjd8P5J7H6Upqm3Hvt7dyliIW5rosLvAGb3wiS6HBLj1UmbQgD485}"
  valid-duration: 3600
  refreshable-duration: 36000

recaptcha:
  secret: ${RECAPTCHA_SECRET:6LcNlVArAAAAAABVgugTwNHe5zM34fIJmYC_lm8w}

digitalocean:
  spaces:
    access-key: ${DO_SPACES_ACCESS_KEY}
    secret-key: ${DO_SPACES_SECRET_KEY}
    endpoint-url: https://sgp1.digitaloceanspaces.com
    region: sgp1
    bucket-name: innolearn-files
    base-url: https://innolearn-files.sgp1.cdn.digitaloceanspaces.com