server:
  port: 8080
  servlet:
    context-path: /lms

spring:
    datasource:
    # Bật `useSSL=true` để tuân thủ yêu cầu sslmode=REQUIRED
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
  servlet:
    multipart:
      max-file-size: 250MB
      max-request-size: 250MB

jwt:
  signerKey: "${JWT_SIGNER_KEY:U+NXeAi5ytRMjd8P5J7H6Upqm3Hvt7dyliIW5rosLvAGb3wiS6HBLj1UmbQgD485}"
  valid-duration: 3600 #in second
  refreshable-duration: 36000 #in second

recaptcha:
