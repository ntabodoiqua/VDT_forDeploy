    access-key: ${DO_SPACES_ACCESS_KEY:DO00XXLFWXMLW74Z2XTP}
    secret-key: ${DO_SPACES_SECRET_KEY:db+m2lDcfWzZHBVD9GEDQcej97aAGOgo79fopCkFw3g}
    endpoint-url: https://sgp1.digitaloceanspaces.com # Endpoint của region bạn dùng
